spring.application.name=FocusPro

# --- JWT ---
jwt.secret=${JWT_SECRET}

spring.jpa.hibernate.ddl-auto=none
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db.changelog/db.changelog-master.xml

logging.level.org.springframework.security=DEBUG

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- DATABASE (from Render ENV) ---
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- GOOGLE OAUTH (from Render ENV) ---
spring.security.oauth2.client.registration.google.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
server.address=0.0.0.0
server.port=${PORT:8080}

ai.api.url=https://api.groq.com/openai/v1/chat/completions
ai.api.key=${AI_API_KEY}
ai.model=llama-3.3-70b-versatile
ai.use.anthropic.format=false

# --- ElevenLabs TTS ---
elevenlabs.api.key=${ELEVENLABS_API_KEY:}
elevenlabs.voice.id=${ELEVENLABS_VOICE_ID:}

# --- Firebase (push notifications, optional) ---
firebase.credentials.json=${FIREBASE_CREDENTIALS_JSON:}

# --- VAPID Web Push (browser push without Firebase) ---
# Generate keys: npx web-push generate-vapid-keys
# Set these as env vars on Render.
vapid.public.key=${VAPID_PUBLIC_KEY:}
vapid.private.key=${VAPID_PRIVATE_KEY:}
vapid.subject=${VAPID_SUBJECT:mailto:admin@focuspro.com}